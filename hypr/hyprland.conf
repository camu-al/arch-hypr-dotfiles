# Source Files
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/startup.conf
source = $HOME/.config/hypr/inputs.conf
source = $HOME/.config/hypr/keybinds.conf
source = $HOME/.config/hypr/windowrules.conf
source = $HOME/.config/hypr/animations.conf
source = $HOME/.config/hypr/themes/theme.conf


# Layouts
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}


# Misc
# See https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vrr = 0                      # 0=OFF 1=ON 2=FULLSCREEN ONLY
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    anr_missed_pings = 5
    allow_session_lock_restore = true
}

xwayland {
    force_zero_scaling = true
}

general {
    snap {                       # snapping for floating windows
        enabled = true
    }
}

# Variables de entorno para NVIDIA y Firefox
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1


# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}


# Misc
# See https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vrr = 0                      # 0=OFF 1=ON 2=FULLSCREEN ONLY
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    anr_missed_pings = 5
    allow_session_lock_restore = true
}

xwayland {
    force_zero_scaling = true
}

general {
    snap {                       # snapping for floating windows
        enabled = true
    }
}

source = /home/camu/.config/hypr/noctalia/noctalia-colors.conf

