#source = $HOME/.config/hypr/animations/default.conf

animations {
    enabled = yes

    # CURVAS BEZIER
    # Una curva que empieza estática y termina con un frenazo seco y elegante
    bezier = quickOut, 0.1, 1, 0.1, 1
    bezier = snappy, 0.3, 0, 0.2, 1
    bezier = shot, 0.2, 1, 0.2, 1

    # CONFIGURACIÓN DE ANIMACIONES
    animation = windows, 1, 3, quickOut, popin 85%
    animation = windowsOut, 1, 3, snappy, popin 90%
    
    # border
    animation = border, 1, 2, default
    
    # fade
    animation = fade, 1, 3, quickOut
    
    # workspaces
    animation = workspaces, 1, 4, quickOut, slidefade 20%
    
    # specialWorkspace.
    animation = specialWorkspace, 1, 3, shot, slidevert
}
